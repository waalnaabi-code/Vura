font-family:Arial,sans-serif;

body{
background:#FFF8FA;
color:#222;
}

header{
background:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
}

.logo{
font-size:30px;
font-weight:bold;
letter-spacing:2px;
color:#E79AB6;
}

nav a{
text-decoration:none;
color:#333;
margin-left:25px;

}

.hero{

display:flex;

justify-content:center;

.hero p{

}

.btn{

color:white;
padding:15px 35px;

font-weight:bold;

.products h2{
text-align:center;
margin-bottom:40px;
font-size:35px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.card h3{

.price{
padding:0 15px 20px;
color:#E79AB6;
font-weight:bold;
font-size:22px;
}

.contact{
padding:80px 8%;
text-align:center;

}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
